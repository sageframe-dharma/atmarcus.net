const { useState } = React;

const F = {
  display: "'DM Serif Display', Georgia, serif",

function Label({ children, dark }) {

}

function Prose({ children, dark, style }) {
  return <p style={{ fontSize: "1.05rem", color: dark ? C.darkText : C.inkLight, marginBottom: "1.5rem", lineHeight: 1.75, maxWidth: 660, ...style }}>{children}</p>;
}

function Section({ dark, children, style, id }) {

}

function Chip({ children, color }) {

}

}

function ExtLink({ href, children }) {

function ResearchItem({ title, status, children, links }) {

function WritingRef({ title, desc, href }) {

      <div style={{ fontFamily: F.display, fontSize: "1.05rem", color: C.ground, marginBottom: "0.25rem" }}>{title}</div>

function App() {
  return (
    <div>
      {/* ═══ HERO ═══ */}
      <div style={{ borderBottom: "1px solid " + C.rule, padding: "clamp(3rem, 10vh, 6rem) 0 clamp(2rem, 5vh, 3rem)" }}>
        <div style={wrap}>
          <Label>Research Program — Active, Self-Funded</Label>
          <h1 style={{ fontFamily: F.display, fontSize: "clamp(1.8rem, 4vw, 2.8rem)", lineHeight: 1.15, fontWeight: 400, letterSpacing: "-0.01em", margin: "0 0 1.5rem" }}>
            Human Identity in{" "}
            <em style={{ fontStyle: "italic", color: C.accent }}>AI Collaboration</em>
          </h1>
          <Prose>How humans maintain judgment, voice, and genuine understanding while collaborating with AI on creative and generative work. An active research program producing frameworks, diagnostic tools, production methodology, and published writing — developed over sixteen months of daily documented practice, without institutional support.</Prose>
          <Prose style={{ fontSize: "0.95rem", color: C.inkMuted }}>The dominant paradigm for human-AI interaction focuses on the AI system — its capabilities, its alignment, its safety. Almost no one is investigating what happens to the human: how extended collaboration affects voice, evaluative capacity, self-knowledge, and the relationship to your own thinking. This is the gap.</Prose>
        </div>
      </div>

      {/* ═══ THE CLAIM ═══ */}
      <Section dark id="claim">
        <Label dark>The Foundational Claim</Label>
        <h2 style={{ fontFamily: F.display, fontSize: "clamp(1.5rem, 3vw, 2rem)", color: C.ground, marginBottom: "1.5rem", lineHeight: 1.25 }}>The next territory in human–AI collaboration is somatic, relational, and contemplative.</h2>
        <Prose dark>The AI's model of you is linguistic, statistical, and structural. It is a very good model. It catches your rhythms, your habits of thought, your way of arriving at an idea. But it has no access to the thing that makes you you: your body, your practice, your relationships, your twenty-five years of sitting still and paying attention.</Prose>
        <Prose dark>That's not a limitation of the technology. That's where you still live. And the research program begins from the recognition that the human capacities AI cannot model — embodied experience, trained contemplative attention, genuine relational presence — are not peripheral to the collaboration. They are the ground it depends on.</Prose>
        <Prose dark>This argument is developed in full in <em>The Fourth Boundary</em>, drawing on Haraway, Philip K. Dick, Cavell, Buddhist psychology, and the investigator's twenty-five-year contemplative practice. The extended mind thesis (Clark & Chalmers, 1998) provides the cognitive science: if AI is a genuine cognitive extension, then the question of what remains distinctly human is not philosophical decoration — it is the central design problem.</Prose>
        <div style={{ marginTop: "1.5rem" }}>
          <WritingRef title="The Fourth Boundary" desc="The foundational essay. Somatic cognition, the scramble suit, and why your body is the last thing the model can't reach." href="https://sageframe.substack.com/p/the-fourth-boundary" />
          <WritingRef title="Thinking Outside the Skull" desc="The extended mind thesis applied to AI collaboration. Clark, Chalmers, Hutchins, distributed cognition." href="https://sageframe.substack.com/p/thinking-outside-the-skull" />
        </div>
      </Section>

      {/* ═══ THE FRAMEWORK ═══ */}
      <Section id="framework">
        <Label>Diagnostic Framework</Label>
        <h2 style={{ fontFamily: F.display, fontSize: "clamp(1.5rem, 3vw, 2rem)", marginBottom: "1.5rem" }}>Destructive Interference</h2>
        <Prose>An original diagnostic taxonomy identifying seven named classes of structural failure in AI-influenced creative writing: Pre-emptive Evaluation, Performed Urgency, The Throat-Clear, The Balanced Hedge, The Significance Stamp, The Mirror Summary, and The Emotional Instruction.</Prose>
        <Prose>Each class has a defined mechanism (why AI systems produce it), a diagnostic test (how a practitioner identifies it), and documented examples. The framework is structural, not lexical — it operates at the level of rhetorical architecture rather than vocabulary. This is why existing AI detection tools, which rely on statistical features, fail. Trained human judgment, attending to structure, succeeds.</Prose>
        <Prose>Integrated within the framework is a voice profiling methodology — <strong>Voice DNA</strong> — for building comprehensive representations of individual writer identity: sentence structure patterns, rhetorical moves, punctuation fingerprint, register shifts, intellectual traditions, and craft precedents. The profile serves both diagnostic purposes (evaluating whether a draft maintains voice integrity) and generative purposes (constraining AI output to respect voice characteristics).</Prose>
        <Prose style={{ fontWeight: 500, color: C.ink }}>No equivalent framework exists in any commercial product or published research.</Prose>
        <div style={{ display: "flex", gap: "0.75rem", flexWrap: "wrap", marginTop: "1rem" }}>
          <StatusChip status="shipped" />
          <Chip>7 named failure classes</Chip>
          <Chip>integrated voice profiling</Chip>
          <Chip>in daily use since January 2026</Chip>
        </div>
        <div style={{ marginTop: "1.5rem" }}>
          <ExtLink href="https://sageframe.substack.com">Destructive Interference — forthcoming on Substack</ExtLink>
        </div>
      </Section>

      {/* ═══ THE METHODOLOGY ═══ */}
      <Section dark id="methodology">
        <Label dark>Production Methodology</Label>
        <h2 style={{ fontFamily: F.display, fontSize: "clamp(1.5rem, 3vw, 2rem)", color: C.ground, marginBottom: "1.5rem" }}>The Ho System (歩)</h2>
        <Prose dark>A structured methodology for human-AI collaborative development. Not prompting — the development of judgment. The Ho System addresses the core bottleneck of the AI era: access to tools is universal, but the capacity to evaluate, direct, and maintain authority over AI-assisted work is not.</Prose>
        <Prose dark>The system operates at three levels: project framing (a four-document chain producing a buildable plan before any code is written), structured sessions with clear objectives and required reflection, and a progressive mastery model that adapts as the practitioner develops fluency. Seven months of methodology design preceded the first code commit. This sequencing is a core principle.</Prose>
        <Prose dark><strong style={{ color: C.ground }}>Evidence: seven production systems</strong> built from zero prior development experience, each documented from inception through deployment. Including Kanyō — a computer vision platform deployed at Harvard's Memorial Hall, developed in collaboration with Nobel laureate economist Claudia Goldin — and m4Bookmaker, a desktop application shipped on PyPI in 3.5 days.</Prose>
        <div style={{ display: "flex", gap: "0.75rem", flexWrap: "wrap", marginTop: "1rem" }}>
          <StatusChip status="shipped" />
          <Chip>open methodology</Chip>
          <Chip>7 production systems</Chip>
          <Chip>published documentation</Chip>
        </div>
        <div style={{ display: "flex", gap: "1.5rem", flexWrap: "wrap", marginTop: "1.5rem" }}>
          <ExtLink href="../work/ho-system.html">Ho System — full case study</ExtLink>
          <ExtLink href="../work/ho-foundations">Ho System Foundations — position paper</ExtLink>
          <ExtLink href="https://github.com/sageframe-no-kaji/ho-system">GitHub repository</ExtLink>
          <ExtLink href="https://sageframe.substack.com/p/three-hours">Three Hours — essay on Substack</ExtLink>
        </div>
      </Section>

      {/* ═══ THE EMPIRICAL QUESTION ═══ */}
      <Section id="empirical">
        <Label>Empirical Research</Label>
        <h2 style={{ fontFamily: F.display, fontSize: "clamp(1.5rem, 3vw, 2rem)", marginBottom: "1.5rem" }}>Voice Identity Compression</h2>
        <Prose>Can 10,000 tokens of prose representing a writer's voice be compressed to 500 tokens of structured notation without losing generative fidelity?</Prose>
        <Prose>Every AI system that attempts personalization faces this problem: representing a specific human's cognitive and stylistic identity efficiently within a finite context window. Current approaches — system prompts, fine-tuning, retrieval augmentation — are lossy, expensive, or brittle. The question of what the <em>minimal</em> representation of a human voice looks like has not been asked, because it sits at the intersection of computational linguistics, information theory, cognitive science, and transformer architecture. Four departments. Nobody introduced them.</Prose>
        <Prose>The adjacent work exists in isolation: prompt compression research (Microsoft LLMLingua), computational stylistics (Burrows, Eder et al.), embedding research, distributed cognition theory. The pieces are all there. They are in different rooms.</Prose>
        <Prose>The experiment is designed: extract features from an existing corpus, design a compressed notation, generate from full representation vs. compressed vs. null, measure fidelity. The corpus exists. The voice profile exists. The infrastructure is in place.</Prose>
        <div style={{ display: "flex", gap: "0.75rem", flexWrap: "wrap", marginTop: "1rem" }}>
          <StatusChip status="proposed" />
          <Chip>experiment designed</Chip>
          <Chip>corpus available</Chip>
          <Chip>infrastructure in place</Chip>
        </div>
        <div style={{ marginTop: "1.5rem" }}>
          <ExtLink href="https://sageframe.substack.com">The Amateur's Laboratory — forthcoming on Substack</ExtLink>
        </div>
      </Section>

      {/* ═══ THE INSTRUMENTS ═══ */}
      <Section dark id="instruments">
        <Label dark>Practitioner Instruments</Label>
        <h2 style={{ fontFamily: F.display, fontSize: "clamp(1.5rem, 3vw, 2rem)", color: C.ground, marginBottom: "1rem" }}>Tools for self-knowledge in AI collaboration</h2>
        <Prose dark style={{ color: "#d8d2c8" }}>The sycophancy problem has been studied from the AI's side — models tend to agree with their users. The reciprocal problem — users tend to lose evaluative sharpness when surrounded by agreement — has not been instrumentalized. These tools address the human side.</Prose>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: "1.25rem", marginTop: "2rem" }}>
          <div style={{ padding: "1.25rem 1.5rem", background: C.darkBgDeep, border: "1px solid " + C.darkRule, borderRadius: 2 }}>
            <div style={{ display: "flex", alignItems: "center", gap: "0.75rem", marginBottom: "0.75rem" }}>
              <div style={{ fontFamily: F.display, fontSize: "1.05rem", color: C.ground }}>Sutra</div>
              <StatusChip status="in development" />
            </div>
            <p style={{ fontSize: "0.88rem", lineHeight: 1.6, color: "#b0a99e" }}>A writing environment where every piece is a version-controlled repository. Revision history — branching, comparison, annotation — is the native experience. Making the trail of your own thinking visible counteracts the tendency to lose track of your positions during sustained collaboration. Architecture complete.</p>
          </div>
          <div style={{ padding: "1.25rem 1.5rem", background: C.darkBgDeep, border: "1px solid " + C.darkRule, borderRadius: 2 }}>
            <div style={{ display: "flex", alignItems: "center", gap: "0.75rem", marginBottom: "0.75rem" }}>
              <div style={{ fontFamily: F.display, fontSize: "1.05rem", color: C.ground }}>Shodo (書道)</div>
              <StatusChip status="in development" />
            </div>
            <p style={{ fontSize: "0.88rem", lineHeight: 1.6, color: "#b0a99e" }}>AI conversation history as searchable, synthesizable knowledge. Not retrieval — pattern finding. Tracing intellectual threads, decision patterns, and evolving thinking across hundreds of conversations. Surfacing meta-patterns inaccessible from within any single conversation.</p>
            <div style={{ marginTop: "0.75rem" }}><ExtLink href="https://github.com/sageframe-no-kaji/shodo">GitHub</ExtLink></div>
          </div>
          <div style={{ padding: "1.25rem 1.5rem", background: C.darkBgDeep, border: "1px solid " + C.darkRule, borderRadius: 2 }}>
            <div style={{ display: "flex", alignItems: "center", gap: "0.75rem", marginBottom: "0.75rem" }}>
              <div style={{ fontFamily: F.display, fontSize: "1.05rem", color: C.ground }}>Kinhin (経行)</div>
              <StatusChip status="in development" />
            </div>
            <p style={{ fontSize: "0.88rem", lineHeight: 1.6, color: "#b0a99e" }}>Structured tracking of practitioner growth across projects, skills, and reflective practices. A progression baseline independent of the AI's assessment of your growth — the ground truth necessary for evaluating the collaboration honestly.</p>
          </div>
        </div>
      </Section>

      {/* ═══ GLASSROOM — APPLIED RESEARCH ═══ */}
      <Section id="glassroom">
        <Label>Applied Research</Label>
        <h2 style={{ fontFamily: F.display, fontSize: "clamp(1.5rem, 3vw, 2rem)", marginBottom: "1.5rem" }}>Glassroom — EdTech Accountability Infrastructure</h2>
        <Prose>An open-source tool that scrapes Google Classroom at the student level — every assignment, every attachment, every empty field — and aggregates it into a single dashboard with CSV export and PDF downloads. The first tool that produces student-level implementation variance data for Google Classroom. No published research has examined this variance at the implementation level. Glassroom is the first instrument that makes it visible.</Prose>
        <Prose>Built while doing IEP advocacy for a student whose accommodation plan required teachers to post materials digitally. Within one school, Glassroom revealed that teacher implementation ranged from 140 well-structured assignments with weekly organization to 61 assignments with zero due dates, zero descriptions, and no actionable instructions. Google Classroom permits both and makes neither visible.</Prose>
        <Prose>The tool anchors a broader research project. A position paper — <ExtLink href="empty-container.html"><em>The Empty Container</em></ExtLink> — argues that Google Classroom's lack of structural requirements creates accountability gaps that harm vulnerable students, particularly those with IEPs, and that the platform fails to meet the Universal Design for Learning standards endorsed by federal law. I am pursuing a research collaboration with Harvard Graduate School of Education to conduct the first multi-site empirical implementation audit of Google Classroom, using Glassroom as the research instrument.</Prose>
        <Prose>Through Blueprint for Creativity, this work also has a consulting application: district implementation audits, UDL-aligned standards design, and teacher training — built on 25 years of learning systems design, including the assessment infrastructure I built at NuVu Studio and ARCK Boston.</Prose>
        <div style={{ display: "flex", gap: "0.75rem", flexWrap: "wrap", marginTop: "1rem" }}>
          <StatusChip status="shipped" />
          <Chip>open source</Chip>
          <Chip>position paper written</Chip>
          <Chip>Harvard GSE collaboration in pursuit</Chip>
        </div>
        <div style={{ display: "flex", gap: "1.5rem", flexWrap: "wrap", marginTop: "1.5rem" }}>

          <ExtLink href="https://github.com/sageframe-no-kaji/glassroom">GitHub repository</ExtLink>
        </div>
      </Section>

      {/* ═══ GENERALIZATION ═══ */}
      <Section id="next">

  <script>
    const toggle = document.querySelector('.nav-toggle');
    const sheet = document.getElementById('bottomSheet');
    const backdrop = document.getElementById('sheetBackdrop');
    function openSheet() { sheet.classList.add('open'); backdrop.classList.add('visible'); toggle.setAttribute('aria-expanded','true'); document.body.style.overflow='hidden'; }
    function closeSheet() { sheet.classList.remove('open'); backdrop.classList.remove('visible'); toggle.setAttribute('aria-expanded','false'); document.body.style.overflow=''; }
    toggle.addEventListener('click', () => sheet.classList.contains('open') ? closeSheet() : openSheet());
    backdrop.addEventListener('click', closeSheet);
    sheet.querySelectorAll('a').forEach(a => a.addEventListener('click', closeSheet));

    // Section nav scroll tracking — wait for React/Babel to render
    function initSectionNav() {
      const claimSection = document.getElementById('claim');
      if (!claimSection) { setTimeout(initSectionNav, 100); return; }

      const snavLinks = document.querySelectorAll('.snav-link');
      const snavIds = ['claim','framework','methodology','empirical','instruments','glassroom','next'];
      const snavSections = snavIds.map(id => document.getElementById(id));
      const snavObs = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            snavLinks.forEach(l => l.classList.remove('active'));
            const link = document.querySelector('.snav-link[href="#' + entry.target.id + '"]');
            if (link) link.classList.add('active');
          }
        });
      }, { rootMargin: '-40% 0px -55% 0px' });
      snavSections.forEach(s => s && snavObs.observe(s));

      // Show/hide section nav based on scroll position
      const sectionNav = document.querySelector('.section-nav');
      if (sectionNav) {
        window.addEventListener('scroll', () => {
          // Hide when at the very top (within 200px), show when scrolled down
          if (window.scrollY < 200) {
            sectionNav.classList.remove('visible');
          } else {
            sectionNav.classList.add('visible');
          }
        }, { passive: true });
      }
    }
    initSectionNav();
  </script>
