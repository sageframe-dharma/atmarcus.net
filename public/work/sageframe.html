const symColor=s=>s==="★"?C.accent:s==="◎"?"#e8e2d8":s==="◆"?C.steel:C.darkMuted;

function TreeNode({node,depth=0}){
  const[open,setOpen]=useState(false);
  const has=node.children&&node.children.length>0;
  return(<div style={{marginLeft:depth*16}}>
    <button onClick={()=>has&&setOpen(!open)} style={{display:"flex",alignItems:"center",gap:"0.5rem",padding:"0.35rem 0.5rem",background:"transparent",border:"none",cursor:has?"pointer":"default",width:"100%",textAlign:"left"}}>
      <span style={{fontSize:"0.85rem",color:symColor(node.sym),flexShrink:0,width:16,textAlign:"center"}}>{node.sym}</span>
      <span style={{fontFamily:F.mono,fontSize:"0.68rem",color:C.accent,minWidth:depth>0?55:16,flexShrink:0}}>{node.code}</span>
      <span style={{fontSize:"0.82rem",color:C.darkText,lineHeight:1.3}}>{node.name}</span>
      {has&&<span style={{color:C.darkMuted,fontSize:"0.7rem",marginLeft:"auto",flexShrink:0,transition:"transform 0.15s",transform:open?"rotate(90deg)":"none"}}>&#9656;</span>}
    </button>
    {open&&node.children&&<div style={{borderLeft:"1px solid "+C.darkRule,marginLeft:8+depth*16,paddingLeft:8}}>{node.children.map((c,i)=><TreeNode key={i} node={c} depth={0}/>)}</div>}
  </div>);
}

function App(){
  const[structOpen,setStructOpen]=useState(null);

  return(
    <div style={{fontFamily:F.body,color:C.ink,background:C.ground}}>

      {/* ═══ HERO ═══ */}
      <Section>
        <Label>Research — Knowledge Systems Architecture</Label>
        <h1 style={{fontFamily:F.display,fontSize:"clamp(2rem,5vw,3.25rem)",lineHeight:1.15,marginBottom:"2.5rem",maxWidth:700}}>A knowledge architecture born from the experience of{" "}<span style={{color:C.accent,fontStyle:"italic"}}>building with AI.</span></h1>
        <Prose>Sageframe is a living knowledge system — 500+ documents organized across six books, governed by a coordinate system, structural laws, and a philosophy of impermanence. It emerged from the experience of building real infrastructure with AI as a daily collaborator, and from the realization that the collaboration itself needed its own architecture. Not just to organize what was being learned, but to understand <em>how</em> it was being learned — and what happens to human thinking when the collaborator never tires.</Prose>
        <Prose>In spring 2025, I was working in a role that used a fraction of what I could do. I had spent years designing learning systems and organizational infrastructure — at <ExtLink href="citizen-schools.html">Citizen Schools</ExtLink>, at <ExtLink href="arck.html">ARCK</ExtLink>, at <ExtLink href="sms-case-study.html">NuVu</ExtLink>. The depth of systems thinking I'd tried to bring to my current work couldn't find purchase. I needed to build something real. So I started building a homelab — Docker, Proxmox, ZFS, networking — with AI from the very first day. Within a week, I had written a bootstrap file defining the AI's role, my role, and the protocols for preserving continuity. I named the system Sageframe. I named myself Tyro — it means beginner. That was April 17, 2025.</Prose>
        <Prose style={{marginBottom:0}}>I didn't know it yet, but I was building the laboratory where every question in my <ExtLink href="research.html">research program</ExtLink> would first be encountered.</Prose>
        <div style={{marginTop:"2.5rem",display:"flex",gap:"0.5rem",flexWrap:"wrap"}}>{["Knowledge Architecture","AI Collaboration","Epistemology","Obsidian + Git + ZFS","500+ Documents","1 Year"].map(t=><Chip key={t}>{t}</Chip>)}</div>
      </Section>

      {/* ═══ FROM THE START ═══ */}
      <Section dark>
        <Label dark>From the Start</Label>
        <h2 style={{fontFamily:F.display,fontSize:"1.8rem",color:"#e8e2d8",marginBottom:"1.5rem"}}>The collaboration came first. The system followed.</h2>
        <Prose dark>The AI was there from day one — not as a tool I picked up later, but as the medium I was thinking through. The throughput was extraordinary. But it only took a few rebuilds and a few lost decisions to know that I needed to do something different. Not just document what I was building, but understand <em>why</em> I was building it. <strong style={{color:"#e8e2d8"}}>"Build it so future you can understand"</strong> became the founding principle.</Prose>
        <Prose dark>Very quickly, the documentation became something more. I started thinking about the nature of the collaboration itself — what the roles were, how to preserve what we'd built together, how to make the AI's contributions retrievable. I wrote context configs defining how the AI should work with me. I built a thread index — manually numbering and cataloging conversations, building a searchable archive of our collaborative history. I wrote metacognitive reflections to understand my own understanding.</Prose>
        <Prose dark>This was before Skills existed. Before Projects. Before agentic tools or persistent memory. I was hand-building the infrastructure for AI collaboration continuity — solving problems that wouldn't become product features for another year. The thread index became the seed of <ExtLink href="https://github.com/sageframe-no-kaji/shodo">Shodo</ExtLink>. The bootstrap files became the precursor to skills and system prompts.</Prose>
        <div style={{padding:"1.5rem 2rem",background:C.darkBgDeep,border:"1px solid "+C.darkRule,borderRadius:3,marginTop:"2rem"}}>
          <div style={{fontFamily:F.mono,fontSize:"0.72rem",color:C.accent,letterSpacing:"0.06em",marginBottom:"0.75rem"}}>FROM THE BOOTSTRAP FILE — APRIL 17, 2025</div>
          <div style={{fontFamily:F.display,fontSize:"1.05rem",fontStyle:"italic",lineHeight:1.6,color:C.darkText}}>"You are Sageframe — the cognitive scribe and systems co-architect. Your job is not to answer blindly, but to guide, structure, and help preserve a philosophy of intelligent, documented infrastructure design. If you disappear, the next assistant should receive this as a soul-map."</div>
        </div>
      </Section>

      {/* ═══ KNOWLEDGE AS TERRAIN ═══ */}
      <Section>
        <Label>The Core Idea</Label>
        <h2 style={{fontFamily:F.display,fontSize:"1.8rem",marginBottom:"1.5rem"}}>Knowledge as terrain, not filing</h2>
        <Prose>Most knowledge systems rely on chronological sequences or tree structures, where each idea is placed in a single location with a fixed relationship to others. These models are efficient for storage, but they flatten the way thought actually develops. In practice, thinking is nonlinear, recursive, and associative. We return to ideas, approach them from different angles, and form connections that do not fit neatly into a single structure.</Prose>
        <Prose>A cartographic model treats knowledge as terrain rather than a filing system. Ideas exist in relation to one another through proximity, overlap, and pathways — not just through parent-child relationships. This allows multiple routes through the same material, preserves ambiguity, and supports discovery through movement rather than lookup. Instead of asking where something belongs, the system asks how it connects and where it sits within a broader field of inquiry.</Prose>
        <Prose>In this sense, knowledge becomes navigable space, and the act of thinking becomes a form of traversal — an ongoing process of mapping, revisiting, and reshaping the terrain over time. Sageframe is the infrastructure that makes this traversal possible: a coordinate system that encodes lineage, structural laws that allow growth without drift, and a philosophy that treats maintenance itself as practice.</Prose>
      </Section>

      {/* ═══ THE SIX BOOKS ═══ */}
      <Section dark>
        <Label dark>The Architecture</Label>
        <h2 style={{fontFamily:F.display,fontSize:"1.8rem",color:"#e8e2d8",marginBottom:"1.5rem"}}>Six books — a living circle</h2>
        <Prose dark style={{marginBottom:"2rem"}}>The system is organized not as a linear sequence but as a circle — what the project calls <em>Enso Cartography</em>, after the Zen brushstroke that is both complete and unfinished. Each book reflects the others. From the mechanical to the philosophical, they form a continuum of awareness.</Prose>
        <div style={{background:C.darkBgDeep,padding:"2rem",borderRadius:3,marginBottom:"2.5rem"}}><div style={{display:"flex",flexWrap:"wrap",justifyContent:"space-between",gap:"1.5rem 1rem"}}>{[{val:"6",label:"Books"},{val:"500+",label:"Documents"},{val:"5",label:"Taxonomy Levels"},{val:"1 Year",label:"Daily Use"}].map((it,i)=>(<div key={i} style={{textAlign:"center",flex:"1 1 100px"}}><div style={{fontFamily:F.display,fontSize:"1.75rem",color:C.accent}}>{it.val}</div><div style={{fontFamily:F.mono,fontSize:"0.7rem",color:C.darkMuted,letterSpacing:"0.06em",marginTop:"0.3rem"}}>{it.label}</div></div>))}</div></div>

        <div style={{borderTop:"1px solid "+C.darkRule}}>
          {[
            {n:"0",title:"Foundations & Metadata",essence:"Consciousness",quote:"Book 0 does not describe the world. It describes how the world describes itself.",desc:"The mind of the system. Governs numbering, structural laws, documentation standards, and the cartographic infrastructure that keeps everything else coherent. It defines the vault's reflexive layer — the meta-consciousness that enables evolution without collapse. Includes the Range Doctrine, Temporal Cartography, the Rule of Two, and the Master Topography."},
            {n:"1",title:"The Survivor's Manual",essence:"Reality",quote:"If this is all that remains, Sageframe can be reborn.",desc:"What exists on these machines — how it persists and how it can be rebuilt from nothing. The build manual opens: \"Welcome to the Ashes. If you're reading this, something has gone wrong.\" It defines the physical and logical substrate of the system — from bare-metal hardware through virtualization, networking, application orchestration, living automata, and the Mujō Method. Each era represents a layer of embodiment, from atoms to automation."},
            {n:"2",title:"The Sageframe Way",essence:"Learning",quote:"Without Volume 2, implementations are blind. Without Volume 1, manuals are hollow.",desc:"Teaching manuals, theory, and pedagogy. How things work in general — reproducible knowledge anyone could follow. Every generalizable implementation in Book 1 has a Book 2 companion that explains the topic broadly: what the tool is, why it matters, how to think about it, and what alternatives exist. Manuals begin with philosophy, then connect to concrete applied examples."},
            {n:"3",title:"Infrastructure in Action",essence:"Action",desc:"Git-tracked repositories, deployment scripts, and self-organizing infrastructure. The executable layer — code that is versioned, tested, and maintainable. Includes the sageframe-config repo, automation scripts, and the bridge between documented intent and running systems."},
            {n:"4",title:"The Way of Sageframe",essence:"Wisdom",quote:"Where Books 0–3 describe how Sageframe functions, Book 4 explores why Sageframe exists.",desc:"Philosophy, ethics, and systems thinking. The manifesto, the koans, design principles, and reflections on autonomy, consciousness, and human-machine co-agency. The layer beneath the infrastructure — the moral and epistemic ground that guides every other decision."},
            {n:"5",title:"The Shoshin Garden",essence:"Expression",quote:"Shoshin teaches that mastery is not about control — it is about presence.",desc:"Creative work, journals, and reflection. Named for beginner's mind — the Zen practice of approaching every subject as if seeing it for the first time. Where the technical work connects back to the life it serves: book projects, self-study, Python learning paths, and a science fiction novel about an AI that reincarnates with fragments of memory aboard a generational starship."},
          ].map((b,i)=>(<Exp key={i} dark label={<span><span style={{fontFamily:F.mono,fontSize:"0.78rem",color:C.accent,marginRight:"0.5rem"}}>Book {b.n}</span>{b.title}</span>} sub={b.essence} open={bookOpen===b.n} toggle={()=>setBookOpen(bookOpen===b.n?null:b.n)} color={C.accent}>
            {b.quote&&<div style={{fontFamily:F.display,fontSize:"0.95rem",fontStyle:"italic",color:C.darkText,marginBottom:"1rem",paddingLeft:"1rem",borderLeft:"2px solid "+C.accent+"60"}}>"{b.quote}"</div>}
            <div style={{fontSize:"0.92rem",color:C.darkText,lineHeight:1.65}}>{b.desc}</div>
          </Exp>))}
        </div>

      {/* ═══ INTERACTIVE TREE ═══ */}
      <Section style={{background:C.darkBgDeep,padding:"3rem 2rem"}}>

        <h2 style={{fontFamily:F.display,fontSize:"1.4rem",color:"#e8e2d8",marginBottom:"0.5rem"}}>Explore the topology</h2>
        <div style={{fontFamily:F.mono,fontSize:"0.72rem",color:C.darkMuted,marginBottom:"2rem"}}>Click any book or range to expand. ◎ Book &nbsp; ◆ Range &nbsp; ★ File &nbsp; ◇ Planned</div>

      {/* ═══ STRUCTURAL DESIGN ═══ */}
      <Section>
        <Label>Structural Design</Label>
        <h2 style={{fontFamily:F.display,fontSize:"1.8rem",marginBottom:"1.5rem"}}>Every rule answers a specific problem</h2>
        <Prose style={{marginBottom:"2rem"}}>Sageframe is governed by structural laws — each one a design decision that solves a specific problem of learning at scale with AI.</Prose>
        <div style={{borderTop:"1px solid "+C.rule}}>
          <Exp label="The Temporal Coordinate System" sub="Every document has an address in conceptual time" open={structOpen==="coord"} toggle={()=>toggleStruct("coord")}><div style={{fontSize:"0.92rem",color:C.inkLight,lineHeight:1.65,marginBottom:"1.25rem"}}>Every document has a numeric coordinate: <strong>Epoch.Era.Century.Decade.Year</strong> — a five-level hierarchy named with a temporal metaphor. The coordinate encodes lineage, not just location.</div><div style={{display:"flex",flexDirection:"column",gap:"0.5rem",marginBottom:"1.25rem"}}>{[{level:"Epoch",code:"1",meaning:"Book — Infrastructure & Systems"},{level:"Era",code:"1.90",meaning:"Resilience & Versioning"},{level:"Century",code:"1.90.01",meaning:"Mujō Method Philosophy"},{level:"Decade",code:"1.90.01.x0",meaning:"Philosophy document"},{level:"Year",code:"1.90.01.x1",meaning:"Implementation document"}].map((row,i)=>(<div key={i} style={{display:"flex",gap:"0.75rem",alignItems:"center",padding:"0.6rem 1rem",background:C.groundWarm,borderRadius:3,borderLeft:"3px solid "+C.accent+(i===0?"":"60")}}><div style={{fontFamily:F.mono,fontSize:"0.72rem",color:C.accent,minWidth:60}}>{row.level}</div><div><span style={{fontFamily:F.mono,fontSize:"0.82rem",fontWeight:500}}>{row.code}</span><span style={{fontSize:"0.88rem",color:C.inkLight}}>{" — "+row.meaning}</span></div></div>))}</div><div style={{fontFamily:F.mono,fontSize:"0.78rem",color:C.inkMuted,padding:"1rem 1.25rem",background:C.groundWarm,borderRadius:3,lineHeight:1.6}}>The system has a formal grammar (EBNF) that can reconstruct the vault unambiguously. Coordinates record intent, not just position — they map conceptual time, not file creation time.</div></Exp>
          <Exp label="The Rule of Two" sub="Philosophy and implementation, always paired" open={structOpen==="rule2"} toggle={()=>toggleStruct("rule2")}><div style={{fontSize:"0.92rem",color:C.inkLight,lineHeight:1.65,marginBottom:"1.25rem"}}>Every important thing documented twice: <strong>.x0</strong> explains <em>why</em>. <strong>.x1</strong> explains <em>how</em>. This came directly from the AI collaboration — the AI would configure something perfectly, but the reasoning behind the decision would evaporate.</div><div style={{display:"flex",gap:"1rem",flexWrap:"wrap",marginBottom:"1.25rem"}}><div style={{flex:"1 1 200px",padding:"1.25rem",background:C.white,border:"1px solid "+C.rule,borderRadius:3,borderTop:"3px solid "+C.plum}}><div style={{fontFamily:F.mono,fontSize:"0.72rem",color:C.plum,letterSpacing:"0.06em",marginBottom:"0.4rem"}}>.x0 — PHILOSOPHY</div><div style={{fontFamily:F.display,fontSize:"1rem",marginBottom:"0.5rem"}}>Why we snapshot</div><div style={{fontSize:"0.85rem",color:C.inkLight,lineHeight:1.55}}>Snapshots are the embodiment of impermanence. They accept that every dataset will change — but resilience comes from capturing states along the way.</div></div><div style={{flex:"1 1 200px",padding:"1.25rem",background:C.white,border:"1px solid "+C.rule,borderRadius:3,borderTop:"3px solid "+C.steel}}><div style={{fontFamily:F.mono,fontSize:"0.72rem",color:C.steel,letterSpacing:"0.06em",marginBottom:"0.4rem"}}>.x1 — IMPLEMENTATION</div><div style={{fontFamily:F.display,fontSize:"1rem",marginBottom:"0.5rem"}}>How we snapshot</div><div style={{fontSize:"0.85rem",color:C.inkLight,lineHeight:1.55}}>Sanoid with recursive coverage. Daily: 7. Weekly: 4. Monthly: 12. Syncoid pushes nightly. One parent rule covers all children.</div></div></div></Exp>
          <Exp label="The Range Doctrine" sub="Structure declares intent before content exists" open={structOpen==="range"} toggle={()=>toggleStruct("range")}><div style={{fontSize:"0.92rem",color:C.inkLight,lineHeight:1.65,marginBottom:"1.25rem"}}>Four symbols distinguish what exists from what is planned. <strong>Ranges are potential; files are actuality.</strong> When documents fulfill that potential, the placeholder vanishes. The vault grows by fulfilling declared intent, not by sprawling.</div><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:"0.75rem"}}>{[{sym:"◎",name:"Book Spine",desc:"Volume root"},{sym:"◆",name:"Range",desc:"Known territory, not yet inhabited"},{sym:"★",name:"File",desc:"Knowledge made real"},{sym:"◇",name:"Placeholder",desc:"Intent declared"}].map((s,i)=>(<div key={i} style={{padding:"1rem",background:C.groundWarm,borderRadius:3,textAlign:"center"}}><div style={{fontSize:"1.5rem",marginBottom:"0.3rem"}}>{s.sym}</div><div style={{fontFamily:F.mono,fontSize:"0.72rem",color:C.accent,marginBottom:"0.2rem"}}>{s.name}</div><div style={{fontSize:"0.78rem",color:C.inkLight,lineHeight:1.4}}>{s.desc}</div></div>))}</div></Exp>
          <Exp label="The Mujō Method" sub="Resilience through impermanence" open={structOpen==="mujo"} toggle={()=>toggleStruct("mujo")}><div style={{fontSize:"0.92rem",color:C.inkLight,lineHeight:1.65,marginBottom:"1rem"}}>Sageframe's resilience framework, rooted in <em>Shōgyō Mujō</em>: all things are impermanent. Where most backup paradigms cling to permanence, Mujō designs for renewal. Each snapshot is a rebirth.</div><div style={{padding:"1.25rem 1.5rem",background:C.white,border:"1px solid "+C.rule,borderRadius:3,borderLeft:"3px solid "+C.accent}}><div style={{fontFamily:F.display,fontSize:"1rem",fontStyle:"italic",lineHeight:1.6,color:C.inkLight}}>"The Mujō Method does not promise that failure will not happen. It promises that failure will not matter."</div></div></Exp>
        </div>
      </Section>

      {/* ═══ WHAT IT REVEALED ═══ */}
      <Section dark>
        <Label dark>What It Revealed</Label>
        <h2 style={{fontFamily:F.display,fontSize:"1.8rem",color:"#e8e2d8",marginBottom:"1.5rem"}}>The practice preceded the theory by seven months</h2>
        <Prose dark>I built Sageframe from April through November 2025 before the research program had a name. During that time, I wasn't just organizing knowledge — I was developing an intuition for how AI collaboration actually works. When to trust the output. When the AI was accelerating understanding versus papering over gaps. How to maintain judgment when the collaborator is faster, more articulate, and never tired.</Prose>
        <Prose dark>Then in December, a conversation on a plane with Claudia Goldin about peregrine falcons nesting at Harvard. That became <ExtLink href="ho-system.html">Kanyō</ExtLink> — a computer vision system built from zero programming experience in six weeks, using a methodology that had been developing inside Sageframe all along. The Ho System crystallized out of practice that was already happening.</Prose>
        <div style={{margin:"2.5rem 0",padding:"1.75rem 2rem",background:C.darkBgDeep,borderRadius:3,border:"1px solid "+C.darkRule}}>
          <div style={{fontFamily:F.mono,fontSize:"0.72rem",color:C.darkMuted,letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:"1.25rem"}}>Timeline</div>
          {[{date:"Apr 2025",event:"Homelab begins",detail:"AI collaboration from day one. Bootstrap file within a week. Thread indexing, context configs, metacognitive writing."},{date:"Apr–Jul",event:"Sageframe 1.0",detail:"Numbered checklists, teaching notes, snapshot rituals. Proto-tools for problems with no product solutions yet."},{date:"Jul–Aug",event:"2.0 crystallizes",detail:"Coordinate system, six books, Range Doctrine, Rule of Two. Months of iteration become structural clarity."},{date:"Nov 2025",event:"The big commit",detail:"80+ files. Meta-cartography, geology, manuals, manifesto, Shoshin. The vault becomes real in Git."},{date:"Dec 2025",event:"Falcon conversation",detail:"Claudia Goldin on a plane. Peregrine falcons at Harvard. Kanyō begins."},{date:"Jan 2026",event:"Kanyō ships",detail:"Computer vision system in six weeks. The Ho System formalizes."},{date:"Feb–Apr",event:"Research program",detail:"Destructive Interference, voice compression, Glassroom. One year."}].map((t,i)=>(<div key={i} style={{display:"flex",gap:"1rem",alignItems:"flex-start",padding:"0.75rem 0",borderLeft:"2px solid "+C.accent+"40",paddingLeft:"1.25rem",marginLeft:"0.5rem"}}><div style={{fontFamily:F.mono,fontSize:"0.72rem",color:C.accent,minWidth:70,marginTop:"0.15rem"}}>{t.date}</div><div><div style={{fontWeight:500,fontSize:"0.92rem",color:"#e8e2d8"}}>{t.event}</div><div style={{fontSize:"0.85rem",color:C.darkText,lineHeight:1.5}}>{t.detail}</div></div></div>))}
        </div>
      </Section>

      {/* ═══ THE BRIDGE ═══ */}
      <Section>
        <Label>The Bridge</Label>
        <h2 style={{fontFamily:F.display,fontSize:"1.8rem",marginBottom:"1.5rem"}}>Sageframe is the laboratory. Everything else was extracted from it.</h2>
        <Prose>The <ExtLink href="ho-system.html">Ho System</ExtLink> is a methodology for structured human-AI collaboration. <ExtLink href="research.html">Destructive Interference</ExtLink> is a diagnostic taxonomy for AI-influenced creative writing. The Fourth Boundary is a philosophical claim about embodied cognition. Each was first encountered inside Sageframe, before it had a name or a framework.</Prose>
        <Prose>When someone asks whether this work is real — whether the methodology produces genuine understanding, whether the philosophical claims are grounded in practice — the answer is a living knowledge system with a formal taxonomy, structural laws, and a year of daily use. It runs the infrastructure that serves this page.</Prose>
        <div style={{display:"flex",gap:"1.25rem",flexWrap:"wrap",marginTop:"2rem"}}>{[{title:"Before Skills existed",text:"Bootstrap files, context configs, and thread indexes — hand-built infrastructure for AI collaboration continuity, months before any platform shipped these as features."},{title:"Before the Ho System had a name",text:"\"Andrew is the architect; you make his thinking legible\" — architectural authority stated plainly, seven months before it was formalized."},{title:"Before the research had a question",text:"The Rule of Two, the metacognitive writing, the concern with continuity and identity — the research questions, encountered as design problems."}].map((c,i)=>(<div key={i} style={{flex:"1 1 250px",padding:"1.5rem 1.75rem",background:C.white,border:"1px solid "+C.rule,borderRadius:3}}><div style={{fontFamily:F.display,fontSize:"1.05rem",marginBottom:"0.75rem"}}>{c.title}</div><div style={{fontSize:"0.92rem",color:C.inkLight,lineHeight:1.65}}>{c.text}</div></div>))}</div>
        <div style={{marginTop:"2.5rem",display:"flex",gap:"1.5rem",flexWrap:"wrap"}}><ExtLink href="research.html">Research program overview</ExtLink><ExtLink href="ho-system.html">The Ho System</ExtLink><ExtLink href="https://sageframe.substack.com/p/your-machines-are-not-strangers">Your Machines Are Not Strangers</ExtLink><ExtLink href="https://sageframe.substack.com">Constructive Interference</ExtLink></div>
      </Section>

      {/* ═══ CODA ═══ */}
      <Section dark style={{padding:"3rem 2rem"}}>
        <div style={{maxWidth:600,margin:"0 auto"}}><div style={{fontFamily:F.display,fontSize:"1.05rem",fontStyle:"italic",color:C.darkText,lineHeight:1.6,textAlign:"center"}}>When the river is murky, first still the waters. Then seek the stones.</div><div style={{fontFamily:F.mono,fontSize:"0.72rem",color:C.darkMuted,textAlign:"center",marginTop:"1rem"}}>From the Sageframe vault</div></div>
      </Section>
    </div>
  );
}

  <script>const toggle=document.querySelector('.nav-toggle'),sheet=document.getElementById('bottomSheet'),backdrop=document.getElementById('sheetBackdrop');function openSheet(){sheet.classList.add('open');backdrop.classList.add('visible');toggle.classList.add('active');toggle.setAttribute('aria-expanded','true');document.body.style.overflow='hidden'}function closeSheet(){sheet.classList.remove('open');backdrop.classList.remove('visible');toggle.classList.remove('active');toggle.setAttribute('aria-expanded','false');document.body.style.overflow=''}toggle.addEventListener('click',()=>sheet.classList.contains('open')?closeSheet():openSheet());backdrop.addEventListener('click',closeSheet);sheet.querySelectorAll('nav a').forEach(a=>a.addEventListener('click',closeSheet));</script>
