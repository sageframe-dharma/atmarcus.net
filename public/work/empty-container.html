const F = {
  display: "'DM Serif Display', Georgia, serif",
  body: "'IBM Plex Sans', -apple-system, sans-serif",
  mono: "'IBM Plex Mono', 'Courier New', monospace",
};
const C = {
  ink: "#1a1a1a", inkLight: "#4a4a4a", inkMuted: "#7a7a7a",
  ground: "#f5f2ed", groundWarm: "#ebe6dd", accent: "#c45a2d",

  darkBg: "#3d3a37", darkBgDeep: "#1a1a1a", darkRule: "#555", darkMuted: "#999", darkText: "#c8c2b8",

function Label({ children, dark }) {
  return <div style={{ fontFamily: F.body, fontSize: "0.8rem", fontWeight: 600, letterSpacing: "0.12em", textTransform: "uppercase", color: dark ? C.darkMuted : C.inkMuted, marginBottom: "1.5rem" }}>{children}</div>;
}

function Prose({ children, dark, style }) {
  return <p style={{ fontSize: "1.05rem", color: dark ? C.darkText : C.inkLight, marginBottom: "1.5rem", lineHeight: 1.75, maxWidth: 660, ...style }}>{children}</p>;
}

function Section({ dark, children, style, id }) {
  return <section id={id} style={{ background: dark ? C.darkBg : C.ground, padding: "5rem 2rem", ...style }}><div style={{ maxWidth: 900, margin: "0 auto" }}>{children}</div></section>;
}

function SubHead({ children, dark, num }) {
  return (
    <div style={{ display: "flex", alignItems: "baseline", gap: "0.75rem", marginBottom: "1rem", marginTop: "2.5rem" }}>

      <h3 style={{ fontFamily: F.display, fontSize: "1.25rem", color: dark ? "#e8e2d8" : C.ink, fontWeight: 400 }}>{children}</h3>
    </div>
  );
}

function ExtLink({ href, children }) {
  return <a href={href} target="_blank" rel="noopener noreferrer" style={{ color: C.accent, textDecoration: "none", borderBottom: "1px solid " + C.accent + "40" }}>{children}</a>;
}

function Chip({ children }) {
  return <span style={{ fontFamily: F.mono, fontSize: "0.72rem", color: C.inkMuted, letterSpacing: "0.04em", padding: "0.25rem 0.6rem", border: "1px solid " + C.rule, borderRadius: 2, whiteSpace: "nowrap" }}>{children}</span>;
}

function Callout({ children, dark }) {
  return (
    <div style={{ padding: "1.25rem 1.5rem", background: dark ? C.darkBgDeep : C.groundWarm, border: "1px solid " + (dark ? C.darkRule : C.rule), borderRadius: 3, marginBottom: "1.5rem", marginTop: "1.5rem" }}>
      <div style={{ fontSize: "0.92rem", color: dark ? C.darkText : C.inkLight, lineHeight: 1.7 }}>{children}</div>

}

function DataTable({ dark }) {
  const headers = ["Metric", "Class A (ELA)", "Class B (Social Studies)", "Class C (Math)", "Class D (Science)"];
  const rows = [
    ["Total assignments", "140", "61", "40", "78"],
    ["Organized by week", "Yes (Week 1–25)", "No (\"No topic\")", "No", "Partial"],
    ["Due dates set", "102 (73%)", "0 (0%)", "0 (0%)", "Partial"],
    ["Category tags", "Yes", "No", "No", "No"],
    ["Assignments with attachments", "120 (86%)", "53 (87%)", "1 (3%)", "44 (56%)"],
    ["Assignments graded", "32", "0", "0", "8"],
    ["Assignments still \"Assigned\"", "~35", "40", "39", "45"],
    ["Descriptions provided", "0", "0", "0", "0"],
  ];
  const cellBase = { padding: "0.6rem 0.75rem", fontSize: "0.82rem", lineHeight: 1.5, borderBottom: "1px solid " + (dark ? C.darkRule : C.rule) };
  return (

            ))}

function App() {
  return (
    <div style={{ fontFamily: F.body, color: C.ink, background: C.ground }}>

      {/* ═══ HERO ═══ */}
      <Section>
        <Label>Position Paper</Label>
        <h1 style={{ fontFamily: F.display, fontSize: "clamp(2rem, 5vw, 3.25rem)", lineHeight: 1.15, marginBottom: "1rem", maxWidth: 700 }}>
          The Empty{" "}
          <span style={{ color: C.accent, fontStyle: "italic" }}>Container</span>
        </h1>
        <div style={{ fontFamily: F.body, fontSize: "1.05rem", color: C.inkLight, marginBottom: "1.5rem", fontStyle: "italic", maxWidth: 660 }}>
          How Google Classroom's Design Failures Create Accountability Gaps That Harm Vulnerable Students
        </div>
        <div style={{ fontFamily: F.mono, fontSize: "0.82rem", color: C.inkMuted, marginBottom: "2.5rem", display: "flex", gap: "1.5rem", flexWrap: "wrap" }}>
          <span>Andrew Todd Marcus</span>
          <span>April 2026</span>
        </div>
        <Prose>
          Google Classroom is used by over 150 million students and educators worldwide and functions as the de facto learning management system in the majority of American K–12 schools. It is not a learning management system. It lacks the structural features — curriculum sequencing, assessment architecture, consistency enforcement, cross-class visibility, parent-facing dashboards — that define an LMS. It is a file-sharing platform with an assignment submission layer, adopted at scale because it is free and embedded in the Google Workspace ecosystem that school districts already use.
        </Prose>
        <Prose>
          This paper presents what may be the first published empirical implementation audit of Google Classroom at the individual student level — measuring not whether the platform is effective in the abstract, but how it is actually used by teachers within a single school and what that variance means for a student who depends on it. Data was collected through Glassroom, an open-source tool that automates the extraction and structuring of Google Classroom content using browser automation. Within a single school in a district spending over $40,000 per student per year, a single student's classes ranged from 140 well-structured assignments with weekly organization and due dates to 61 assignments with zero due dates, zero descriptions, and no actionable instructions. The platform neither prevents this disparity nor makes it visible.
        </Prose>
        <Prose>
          For the 7.9 million students receiving special education services under IDEA Part B (CRS, 2026), this opacity has legal significance. IEP accommodations that require teachers to "provide home copies of classwork and slides via Google Classroom" are unverifiable without tools that do not exist within the platform. Research consistently finds that IEPs are treated as compliance documents rather than individualization tools — that teams approach them "more like a form than an individually constructed document" (Kurth et al., 2022) — and that a third of stated student needs go unaddressed by goals or services (Kurth et al., 2025). Google Classroom's structural emptiness compounds this failure: even when an IEP mandates digital delivery of materials, the platform provides no mechanism to verify that the mandate has been met.
        </Prose>
        <Callout>
          <strong>The central argument:</strong> School districts adopting Google Classroom as their primary learning platform have a responsibility to establish and enforce minimum standards for its use, to provide transparency mechanisms for families, and to audit teacher implementation — particularly for students whose legal protections depend on the platform's content.
        </Callout>
        <div style={{ marginTop: "2rem", display: "flex", gap: "0.5rem", flexWrap: "wrap" }}>
          {["Position Paper", "Google Classroom", "Special Education", "IEP Compliance", "EdTech", "Universal Design for Learning"].map(t => <Chip key={t}>{t}</Chip>)}
        </div>
      </Section>

      {/* ═══ SECTION 1: THE PLATFORM AND ITS ADOPTION ═══ */}
      <Section dark id="s1">
        <Label dark>Section 1</Label>
        <h2 style={{ fontFamily: F.display, fontSize: "1.8rem", color: "#e8e2d8", marginBottom: "2rem" }}>The Platform and Its Adoption</h2>
        <Prose dark>Google Classroom launched in 2014 as a front-end to Google's existing productivity suite. Its adoption in K–12 education has been rapid and near-total. Chromebooks dominate the global education device market, accounting for 60% of all laptops and tablets purchased for US K–12 classrooms by 2018 (Futuresource Consulting, 2018). Over 150 million students and educators use Google Workspace for Education globally (Google, 2022). Google Classroom is the default learning platform in American public education.</Prose>
        <Prose dark>The adoption pathway was not pedagogical. The New York Times documented Google's sales strategy: the company targeted teachers who could influence administrators, offered Chromebooks at prices no competitor could match ($149 per device), and provided the software ecosystem for free (Singer, 2017). Chromebook sales in K–12 jumped tenfold between 2012 and 2013. By 2018, Chromebooks accounted for 60% of all laptops and tablets purchased for US K–12 classrooms (Futuresource Consulting, 2018). The ecosystem lock-in was the product. The pedagogy was incidental.</Prose>
        <Prose dark>A peer-reviewed paper in <em>TechTrends</em> conducted a technoethical audit of Google's education practices and found that the company extracts behavioral data from students, builds psychographic profiles without adequate parental consent, and uses its education market dominance to stifle alternatives (Krutka, Heath, &amp; Staudt Willet, 2021). A 2025 complaint filed with the Federal Trade Commission alleges that Google builds "intimate, dynamic behavioral and psychographic profiles" of students through Chromebooks, in potential violation of the Children's Online Privacy Protection Act (NCOSE, 2025).</Prose>
        <Prose dark style={{ marginBottom: 0 }}>Google Classroom's features are well documented. What is less discussed — and more consequential — is what it lacks. Google Classroom did not create the failures documented in this paper. The institutional dysfunction — the compliance orientation, the avoidance of quality evaluation, the failure to individualize — predates the platform by decades. What Google Classroom created is the conditions under which those failures become invisible and unaccountable. A platform with no minimum standard becomes a system with no minimum standard.</Prose>
      </Section>

      {/* ═══ SECTION 2: WHAT GOOGLE CLASSROOM IS NOT ═══ */}
      <Section id="s2">
        <Label>Section 2</Label>
        <h2 style={{ fontFamily: F.display, fontSize: "1.8rem", marginBottom: "2rem" }}>What Google Classroom Is Not</h2>

        <SubHead num="2.1">Missing LMS Functionality</SubHead>
        <Prose>The University of Notre Dame's Academic Technologies group assessed Google Classroom against standard LMS criteria and found it lacking a gradebook, tests and quizzes, discussion forums, a lesson builder, a calendar, and support for the Learning Tools Interoperability (LTI) standard (Notre Dame Academic Technologies, 2017). These are not advanced features. They are baseline functionality that platforms like Canvas, Moodle, and Blackboard have provided for decades.</Prose>
        <Prose>A qualitative study of twelve higher education teachers who had implemented Google Classroom for at least one semester found that teachers perceived it as "only a facilitation tool that can be used for document management and basic classroom management, without having a significant impact on teaching methodologies" (Azhar &amp; Iqbal, 2021). The platform's own users describe it not as a learning environment but as a filing system.</Prose>

        <SubHead num="2.2">Missing Structural Requirements</SubHead>
        <Prose>More critically for the argument of this paper, Google Classroom lacks:</Prose>
        <Prose><strong>Structural requirements for teachers.</strong> There are no required fields when creating an assignment. A teacher can post a title with no description, no instructions, no attachments, no due date, and no rubric. The platform records this as a valid assignment.</Prose>
        <Prose><strong>Consistency enforcement across a school or district.</strong> There is no mechanism for administrators to establish or audit minimum standards for how teachers use the platform. Each teacher's Classroom page is an independent, unreviewed space.</Prose>
        <Prose><strong>Cross-class visibility for students and families.</strong> A student enrolled in six classes must navigate to each class individually to see their assignments. There is no unified dashboard, no "what's due this week" view, no way to compare the quality or quantity of content across classes.</Prose>
        <Prose><strong>Parent-facing accountability.</strong> Parents can access their child's Classroom data by logging in as the student, but there is no parent view, no notification system for incomplete or unstructured assignments, and no way to see the full picture without manually clicking into every class and every assignment.</Prose>
        <Prose><strong>Accommodation verification.</strong> For students with IEPs that mandate specific accommodations through the platform, there is no mechanism for verifying that the accommodation is being implemented. The platform cannot distinguish between a teacher who posts comprehensive materials and a teacher who posts an empty title.</Prose>
        <Prose>These omissions are not technical limitations. They are design choices. Google Classroom was designed as a lightweight tool for teachers who were already organized. It was not designed to ensure that all teachers meet a minimum standard, nor to provide transparency to the families and administrators who depend on it.</Prose>

        <SubHead num="2.3">The SAMR Diagnosis</SubHead>
        <Prose>Research across COVID-era emergency remote learning studies and EdTech implementation research consistently finds that Google Classroom operates almost exclusively at the Substitution level of the SAMR model (Puentedura, 2006): worksheets become Google Docs, hand-ins become digital submissions, and the existing workflow is digitized without transformation (EdWeek Research Center, 2021; RAND Corporation, 2021). The dominant pattern is linear and non-iterative:</Prose>
        <Callout>Post → Complete → Submit → Grade</Callout>
        <Prose>Not:</Prose>
        <Callout>Iterate → Critique → Revise → Reflect</Callout>
        <Prose>This is not an accident of teacher behavior. It is an artifact of platform design. Google Classroom's architecture — an assignment stream with a submission button — encodes the Substitution-level workflow. There are no built-in tools for iteration, peer critique, revision cycles, or process documentation. The platform does not support transformation because it was not designed to.</Prose>
      </Section>

      {/* ═══ SECTION 3: THE ABSENCE OF IMPLEMENTATION AUDITS ═══ */}
      <Section dark id="s3">
        <Label dark>Section 3</Label>
        <h2 style={{ fontFamily: F.display, fontSize: "1.8rem", color: "#e8e2d8", marginBottom: "2rem" }}>The Absence of Implementation Audits</h2>
        <Prose dark>No published study identified in this review has examined how teachers actually use Google Classroom at the implementation level — measuring the quality, completeness, and consistency of what is posted, class by class, within a single school or district.</Prose>
        <Prose dark>The existing research on Google Classroom asks a narrower question: is the platform more effective than no platform at all? Studies consistently find that it is (Sudaryani, Rukmini, &amp; Ardiasih, 2023; Shaharanee, Jamil, &amp; Rodzi, 2016; Basilaia, 2020). This is a bar so low it tells us almost nothing about the quality of what teachers actually provide through the platform. The studies that do exist are predominantly small-scale, perception-based, or conducted during the emergency conditions of COVID-era remote learning. They establish that the platform functions. They do not examine whether what is delivered through it is sufficient.</Prose>
        <Prose dark>The gap in the literature is not whether Google Classroom "works." The gap is whether what teachers post through it is sufficient for students to learn — particularly students who cannot supplement the platform's content with in-person instruction because they are absent, on medical leave, or receiving instruction remotely under an IEP.</Prose>
        <Prose dark style={{ marginBottom: 0 }}>This paper presents what may be the first empirical data addressing that gap.</Prose>
      </Section>

      {/* ═══ SECTION 4: THE VARIANCE ═══ */}
      <Section id="s4">
        <Label>Section 4</Label>
        <h2 style={{ fontFamily: F.display, fontSize: "1.8rem", marginBottom: "2rem" }}>The Variance: Empirical Evidence</h2>

        <SubHead num="4.1">Method</SubHead>
        <Prose>To measure the actual content and structure of Google Classroom as experienced by a student, I built Glassroom — an open-source tool that uses browser automation (Playwright) to extract every assignment from every class into a structured database. The Google Classroom API is blocked by most school districts; Glassroom uses the same browser session a student would use, extracting the data the platform itself refuses to aggregate.</Prose>
        <Prose>For each assignment, Glassroom captures: title, full description text, due date, posted date, teacher name, points possible, status (Assigned, Turned in, Graded, Missing, Done), whether submission is required, grade if assigned, all attachment URLs and titles, and week/topic grouping. Each record is keyed by assignment URL for idempotent re-runs. First-seen and last-modified timestamps create an audit trail. All Google Docs, Slides, and Sheets attachments are downloaded as PDFs via Google's export URL pattern.</Prose>

        <SubHead num="4.2">Data</SubHead>
        <Prose>The following data was collected from a public school district spending over $40,000 per student per year. Four classes, one student, one school year.</Prose>
        <DataTable />

        <SubHead num="4.3">Analysis</SubHead>
        <Prose><strong>Description fields are universally empty.</strong> No teacher in this school uses Google Classroom's description field. All instructional content, when it exists, is placed in attached documents. The platform's primary text field for communicating assignment instructions serves no function in practice.</Prose>
        <Prose><strong>The variance in structural completeness is extreme.</strong> Class A provides weekly organization, due dates on 73% of assignments, category tags, and attached documents on 86% of assignments. Class B provides none of these structural elements — zero due dates across 61 assignments, no week organization, and assignment titles meaningless without in-class context. Class C provides almost no attached materials at all — 1 attachment across 40 assignments. The platform treats all four classes identically.</Prose>
        <Prose><strong>Attachment presence does not indicate instructional completeness.</strong> Class B has attachments on 87% of assignments — a number that might suggest adequate content. Examination of the downloaded PDFs reveals that many attachments are empty templates, curriculum documents from external publishers that assume in-class context, or student-facing documents with no instructions. The presence of a file is not the presence of instruction.</Prose>
        <Prose><strong>Grading patterns correlate with structural completeness.</strong> Class A has graded 32 assignments. Classes B and C have graded zero. The teacher who structures assignments is the teacher who evaluates them. The teacher who posts titles without content does not return feedback.</Prose>
        <Prose><strong>The student experience is fragmented and opaque.</strong> A student navigating these four classes encounters four entirely different systems — one organized by week with clear expectations, one organized by vague unit names with no deadlines, one with almost no digital content, and one somewhere between. The platform provides no mechanism for the student, the family, or the administration to see this fragmentation.</Prose>
        <Callout>The core mechanism is this: the platform defines the minimum standard. If the platform has no minimum, the system has no minimum. Google Classroom enforces nothing — no required fields, no structural consistency, no visibility. The variance documented above — observed in a single school, but enabled by platform architecture that is identical everywhere Google Classroom is deployed — is not teacher inconsistency. It is the absence of system-level constraints, made structural by a platform that encodes no expectations.</Callout>
      </Section>

      {/* ═══ SECTION 5: THE ACCOUNTABILITY GAP ═══ */}
      <Section dark id="s5">
        <Label dark>Section 5</Label>
        <h2 style={{ fontFamily: F.display, fontSize: "1.8rem", color: "#e8e2d8", marginBottom: "2rem" }}>The Accountability Gap</h2>

        <SubHead dark num="5.1">The IEP Compliance Landscape</SubHead>
        <Prose dark>The scale of special education in America is substantial. In the 2023–2024 school year, approximately 7.9 million children ages 3 through 21 received educational services under Part B of IDEA — roughly 15.9% of all public school students (Congressional Research Service, 2026). Each of these students has an Individualized Education Program — a legal document specifying required services and accommodations.</Prose>
        <Prose dark>The research on IEP quality is unambiguous and damning.</Prose>
        <Prose dark>A national-sample study of IEPs for students with complex support needs found that <strong>nearly a third of stated student needs were not addressed by goals or supplementary aids and services</strong> (Kurth et al., 2025). The study found "a large amount of variation in alignment" but neither educational placement nor type of student need predicted whether a need was actually addressed in the IEP. A related study by the same research group found that IEP teams treat the document "more like a form than an individually constructed document" and that the efficiency of online IEP forms comes "as a loss of individualization" (Kurth et al., 2022). Despite the Supreme Court's clarification in <em>Endrew F. v. Douglas County School District</em> (2017) that an IEP should be "a carefully designed document that thoroughly considers the child's present levels, disability, and potential for growth," the evidence suggests the opposite is happening in practice.</Prose>
        <Prose dark>A review of 126 IEPs for students with social, emotional, or behavioral needs found them "somewhat compliant" but failing to "comprehensively address student needs or align across areas, violating the spirit of" IDEA (Hott et al., 2019). Woods et al. (2024), writing in <em>Language, Speech, and Hearing Services in Schools</em>, argue that IEP data have been used to document procedural compliance while ignoring substantive quality — that districts have "simply 'checked the boxes'" rather than ensuring that IEPs function as tools for individualized education.</Prose>
        <Prose dark>The distinction between procedural and substantive compliance is the structural heart of the problem. Procedural compliance means the meeting was held, the forms were filed, the required team members were present. Substantive compliance means the IEP actually addresses the child's actual needs and produces actual educational benefit. A district can be procedurally flawless — every box checked, every deadline met, every signature obtained — and substantively bankrupt. The system rewards the former and rarely examines the latter.</Prose>

        <SubHead dark num="5.2">Consequences for Vulnerable Students</SubHead>
        <Prose dark>This variance has consequences that scale with the vulnerability of the student.</Prose>
        <Prose dark>For a typically developing student attending school daily, the emptiness of Class B's Classroom page is mitigated by in-person instruction. The student receives assignments verbally, completes work in class, and the platform's deficiencies are invisible.</Prose>
        <Prose dark>For a student on medical leave, with an IEP, the platform is the only interface to the curriculum. Every empty field is a wall. A title without instructions is an assignment that cannot be completed. A due date that was never set is a deadline that cannot be met. An attachment that assumes in-class context is a document that communicates nothing.</Prose>

        <SubHead dark num="5.3">The IEP Accommodation Gap</SubHead>
        <Prose dark>The student whose data is presented above has an IEP that includes the following accommodations, signed by the school district:</Prose>
        <div style={{ marginBottom: "1.5rem" }}>
          {[
            "Provide home copies of in-class student notes, classwork, and student-facing slides, either digitally (e.g., Google Classroom) or on paper.",
            "A home-school communication log (weekly or more frequently as needed) will be developed and updated by the team.",
            "The IEP team will develop an action plan for missed work while the student is absent due to documented medical condition for three or more days.",
            "The student will not be penalized academically due to absences, tardies, or missed classes.",
          ].map((item, i) => (
            <div key={i} style={{ padding: "0.75rem 1rem", marginBottom: "0.5rem", background: C.darkBgDeep, border: "1px solid " + C.darkRule, borderRadius: 3, fontSize: "0.92rem", color: C.darkText, lineHeight: 1.6, fontStyle: "italic" }}>"{item}"</div>
          ))}
        </div>
        <Prose dark>The IEP mandates these accommodations. Google Classroom is named as the delivery mechanism. Google Classroom has no way to verify whether any of them have been implemented. The causal chain is: IEP requires X → platform is the designated means of delivery → platform cannot verify X → compliance is unverifiable by design.</Prose>
        <Prose dark>The Glassroom data shows that in Class B, none of these accommodations were implemented through the platform. No home copies of notes or slides were provided. No communication log was maintained. No action plan for missed work was reflected in the assignment structure. The student received a failing grade in the class — an academic penalty for absence, in direct contradiction of the IEP.</Prose>

        <SubHead dark num="5.4">The Parent Experience</SubHead>
        <Prose dark>The research on parent experience in special education confirms that this case is not exceptional.</Prose>
        <Prose dark>McKenna and Brigham (2024), in a qualitative study of parents of students with emotional and behavioral disabilities, found that parents who perceived "a lack of transparency regarding procedures and support options, an unwillingness or inability by schools to provide services, and failing to implement the agreed upon IEP reported high levels of stress and a general mistrust of educators." Parents who reported positive experiences "also discussed overcoming significant challenges to achieve them." The system rewards parents who escalate, fight, document, and advocate relentlessly — and those parents still describe the process as traumatic. Parents who trust the system, who lack resources to fight, who are consumed by the medical and emotional realities of raising a child with disabilities, receive whatever the system defaults to. The platform's empty fields are part of what that default looks like.</Prose>

        <SubHead dark num="5.5">Legal Framework</SubHead>
        <Prose dark>Under IDEA, schools must provide a Free Appropriate Public Education (FAPE) to eligible students. The Supreme Court held in <em>Endrew F. v. Douglas County School District</em> (2017) that schools must offer individualized programming that enables "appropriate progress" — a standard above mere token advancement. Section 504 of the Rehabilitation Act requires that students with disabilities receive educational services designed to meet their individual needs "as adequately as the needs of nondisabled students are met."</Prose>
        <Prose dark>A platform that cannot verify whether IEP accommodations are being implemented is a platform that cannot support FAPE compliance. When that platform is the primary interface between a medically absent student and the curriculum, its structural deficiencies risk becoming procedural violations.</Prose>

        <SubHead dark num="5.6">The Universal Design for Learning Argument: This Is Not a Special Education Problem</SubHead>
        <Prose dark>The accommodations in this student's IEP — post complete materials digitally, include instructions, set due dates, communicate with the family — are not exotic requirements. They are basic instructional design. They are what the Universal Design for Learning framework identifies as good practice for every student.</Prose>
        <Prose dark>UDL, developed by the Center for Applied Special Technology (CAST) in collaboration with Harvard University, is named by name in the Every Student Succeeds Act (ESSA), which encourages states and districts to use federal funding to expand its adoption (ESSA, 2015). UDL's three principles — multiple means of engagement, representation, and action/expression — all point toward the same structural commitment: make the curriculum accessible at the design stage, not as an afterthought.</Prose>
        <Prose dark>The standard analogy is the curb cut. Posting complete assignments to Google Classroom is a curb cut. A teacher who posts an assignment with a clear title, instructions, attached materials, and a due date serves the student with an IEP who can't take notes. That same post also serves the student who was absent for a dentist appointment, the student who was confused in class, the parent trying to help with homework, and the tutor hired to provide supplemental support. Out-of-school tutoring — a service families pay for and increasingly depend on — is functionally impossible when the platform doesn't contain enough information for the tutor to know what the student is learning.</Prose>
        <Prose dark style={{ marginBottom: 0 }}>A platform that required teachers to fill in an instructions field, attach relevant materials, and set a due date before publishing an assignment would not be imposing a special education accommodation. It would be implementing the minimum standard that UDL defines as good practice for all learners. Every competing LMS offers required fields. Google Classroom does not. The result is that the baseline standard the federal government endorses through ESSA is unenforceable on the platform that the vast majority of school districts use.</Prose>
      </Section>

      {/* ═══ SECTION 6: THE INSTITUTIONAL CONTEXT ═══ */}
      <Section id="s6">
        <Label>Section 6</Label>
        <h2 style={{ fontFamily: F.display, fontSize: "1.8rem", marginBottom: "2rem" }}>The Institutional Context: Why Districts Don't Audit</h2>
        <Prose>The failure to audit Google Classroom implementation is not an isolated oversight. It reflects an institutional pattern — documented extensively in a companion paper (<ExtLink href="judgment-at-scale.html">Marcus, 2026a</ExtLink>) — in which accountability systems have been designed to measure outputs rather than quality. Two decades of standards-based accountability policy produced school systems trained to count (test scores, completion rates, login metrics) rather than evaluate (whether what was posted was sufficient for a student to learn from). Google Classroom is the perfect tool for a system that does not want to look closely.</Prose>
        <Prose>Districts spend significant resources on educational technology — but on platforms that produce data for the compliance machine, not platforms that improve teaching quality. Programs like iReady cost approximately $30 per student per subject per year, plus mandatory professional development at $2,000 per session (Curriculum Associates, 2024). A review of iReady's research base noted that its effectiveness studies are largely conducted by parties associated with the publisher (Johns Hopkins School of Education, 2016). Districts spend tens of thousands of dollars annually on it because it produces diagnostic data that accountability frameworks demand.</Prose>
        <Prose>Districts will pay for iReady. They will not pay for tools, training, or oversight that improve the quality of what teachers post to Google Classroom. They will not audit whether their free LMS is being used in a way that serves students. They will not establish minimum standards for assignment structure. The system spends money on anything that produces a number and nothing on anything that requires judgment.</Prose>
        <Prose>The teacher variance documented in this paper — one teacher posting 140 well-structured assignments, another posting 61 empty titles — is also a form of institutional cognitive offloading. When a system provides a tool that produces the appearance of compliance without the substance of quality, the system stops examining the substance. The cognitive offloading research that documents this pattern at the individual level (Gerlich, 2025) operates identically at the institutional level: the district adopts the platform, posts the logins, counts the submissions, and never examines whether anything was taught.</Prose>
        <Prose>Special education teacher burnout compounds the problem. Wong et al. (2017) found that special education teacher burnout is directly associated with teaching practice and student engagement, which in turn affects student IEP outcomes. Burned-out teachers produce worse results for the students who need the most. The system exhausts the professionals it depends on, then fails to notice when the exhaustion degrades service to the most vulnerable students — because the platform that should make the degradation visible was designed to make nothing visible at all.</Prose>
      </Section>

      {/* ═══ SECTION 7: WHAT PURPOSEFUL DESIGN LOOKS LIKE ═══ */}
      <Section dark id="s7">
        <Label dark>Section 7</Label>
        <h2 style={{ fontFamily: F.display, fontSize: "1.8rem", color: "#e8e2d8", marginBottom: "2rem" }}>What Purposeful Design Looks Like</h2>
        <Prose dark>The claim that a learning platform must enforce structure is not theoretical. Platforms that embed pedagogical accountability exist and have been deployed at scale. The point of the following example is not that every platform should replicate this design. It is that platforms <em>can</em> encode expectations — and that when they do, the variance documented in this paper does not occur. The choice to enforce nothing is a design decision, not an inevitability.</Prose>
        <Prose dark>The Studio Management System (SMS), designed over six years at NuVu Studio, demonstrates a fundamentally different approach. The platform serves as a digital studio space — curriculum delivery, process documentation, collaborative assessment, and portfolio generation in a single ecosystem.</Prose>
        <Prose dark>The platform's design embeds expectations:</Prose>
        <Prose dark><strong>Process is required, not optional.</strong> Students document their work iteratively — sketches, research, photographs, writing — not just final submissions. Teachers provide resources and project framing through structured fields, not freeform posting. The tool requires substance because the fields demand it.</Prose>
        <Prose dark><strong>Feedback is bidirectional.</strong> Students and teachers evaluate progress through built-in assessment tools. Narrative evaluation replaces numerical grading as the primary record of achievement. The platform makes the quality of feedback visible to students, families, and administrators.</Prose>
        <Prose dark><strong>The portfolio is the primary artifact.</strong> Assessment is based on documented growth, not snapshot performance. A student's work is visible across projects, collaborators, and time — not siloed by class period.</Prose>
        <Prose dark><strong>The tool shaped the pedagogy.</strong> By requiring documentation, reflection, and iterative work, the platform changed how teachers taught and how students learned. Teachers who used the SMS could not post an empty title and walk away. The platform would not let them.</Prose>
        <Prose dark style={{ marginBottom: 0 }}>Applying the SAMR framework: the SMS operates at the Modification and Redefinition levels by design. It does not digitize existing workflows. It creates new ones — collaborative assessment, process documentation, portfolio-driven evaluation — that would not exist without the platform. Google Classroom operates at the Substitution level because it was designed as a substitute, not a transformation.</Prose>
      </Section>

      {/* ═══ SECTION 8: GLASSROOM ═══ */}
      <Section id="s8">
        <Label>Section 8</Label>
        <h2 style={{ fontFamily: F.display, fontSize: "1.8rem", marginBottom: "2rem" }}>Glassroom: Making the Invisible Visible</h2>
        <Prose>Google Classroom has no audit layer. Districts cannot see what teachers post. Parents cannot see across classes. Administrators cannot enforce minimum standards. The platform's opacity is not a bug — it is the architecture. Glassroom exists because that architecture creates an accountability vacuum, and someone has to fill it. Glassroom is not just a tool. It is an audit layer for a system that lacks one — infrastructure that should exist inside the platform but doesn't, built from the outside because the inside was designed to be empty.</Prose>
        <Prose>The tool uses browser automation (Playwright) to log in as the student, navigate every selected class, and extract every assignment with full metadata. It stores the data in a local database, downloads all Google Docs and Slides as PDFs, and presents everything in a dashboard sortable by class, status, and due date. All data exports to CSV. All data stays on the parent's machine. No data is transmitted to any external server.</Prose>
        <Prose>Glassroom was built as a parent tool. Its secondary function as a research instrument is a consequence of its design. When a parent runs Glassroom across multiple classes, the variance documented in Section 4 becomes visible in seconds. Empty fields are data. A class with zero due dates across sixty-one assignments is a class that was never structured for the student the platform claims to serve. That data, exported and timestamped, becomes evidence — in IEP meetings, in BSEA hearings, in conversations with administrators who have never seen what their teachers' Classroom pages actually look like.</Prose>
        <div style={{ marginTop: "1rem", marginBottom: "2rem" }}>
          <ExtLink href="https://github.com/sageframe-no-kaji/glassroom">Glassroom is open source and available on GitHub &nearr;</ExtLink>
        </div>

        <SubHead num="8.1">Proposed Study</SubHead>
        <Prose>The data presented in this paper represents a single student in a single school. It demonstrates the feasibility of the method and the existence of the variance. A multi-site study is needed to quantify the scope.</Prose>
        <Prose><strong>Research question:</strong> What is the variance in teacher implementation quality within Google Classroom, and how does that variance correlate with student outcomes, IEP compliance, and district oversight practices?</Prose>
        <Prose><strong>Method:</strong> Recruit 50–100 parents across multiple districts through special education advocacy networks. Parents run Glassroom on their child's account with informed consent. Data is anonymized before analysis — no student names, teacher names, or district identifiers. Metrics include: assignment count per class, percentage with due dates, percentage with descriptions, percentage with attachments, status distribution, week/topic organization, and attachment content quality (assessed via qualitative analysis of downloaded PDFs).</Prose>
        <Prose><strong>Proposed measures:</strong> Within-student variance (how different are a single student's classes?), within-school variance (how different are teachers in the same building?), across-district variance (do some districts enforce standards while others don't?), IEP vs. non-IEP comparison (do classes serving students with IEPs show different implementation patterns?), and attachment content analysis (do posted materials contain real instructional content, or empty templates?).</Prose>
      </Section>

      {/* ═══ SECTION 9: RECOMMENDATIONS ═══ */}
      <Section dark id="s9">
        <Label dark>Section 9</Label>
        <h2 style={{ fontFamily: F.display, fontSize: "1.8rem", color: "#e8e2d8", marginBottom: "2rem" }}>Recommendations</h2>
        <div style={{ display: "grid", gap: "1rem", marginTop: "1rem" }}>
          {[
            { title: "For school districts.", text: "Districts that adopt Google Classroom as their primary learning platform should establish and enforce minimum standards for its use, aligned with UDL principles already endorsed by ESSA. These standards should include required fields for all assignments (description or instructions, due date for graded work, and attached materials where applicable), minimum posting frequency per class, and accommodation-specific requirements for students with IEPs. Compliance should be audited through administrative access, not assumed." },
            { title: "For IEP teams.", text: "IEP accommodations that reference Google Classroom should specify measurable implementation criteria. \"Provide home copies of classwork via Google Classroom\" is unenforceable as written. The accommodation should specify what constitutes a complete posting and how compliance will be verified." },
            { title: "For families and advocates.", text: "Until platforms and districts provide built-in transparency, families of students with IEPs and medical absences should independently verify what teachers are posting. Tools like Glassroom make this possible. The data produced — timestamped, structured, exportable — is admissible and persuasive in educational dispute resolution." },
            { title: "For researchers.", text: "The absence of implementation audit data for the most widely used educational platform in America is itself a finding. The tool and methodology presented here offer a replicable, scalable approach to filling that gap." },
            { title: "For Google.", text: "Add a parent dashboard with cross-class visibility. Add required fields for assignments — at minimum, an instructions field and a due date — as the default, with the option to override. Add administrative audit tools. Add accommodation tracking. These features exist in every competing LMS. Their absence in the most widely used educational platform in America is a design choice, not a constraint. Make a different choice." },
          ].map((item, i) => (
            <div key={i} style={{ padding: "1.5rem", background: C.darkBgDeep, border: "1px solid " + C.darkRule, borderRadius: 3 }}>

    const toggle = document.querySelector('.nav-toggle');

    function closeSheet() { sheet.classList.remove('open'); backdrop.classList.remove('visible'); toggle.classList.remove('active'); toggle.setAttribute('aria-expanded', 'false'); document.body.style.overflow = ''; }
    toggle.addEventListener('click', () => sheet.classList.contains('open') ? closeSheet() : openSheet());

    // Side nav scroll tracking — wait for React/Babel to render
    function initSideNav() {
      const s1 = document.getElementById('s1');
      if (!s1) { setTimeout(initSideNav, 100); return; }

      const sideNav = document.querySelector('.side-nav');
      const sideLinks = document.querySelectorAll('.side-nav a');
      const sections = ['s1','s2','s3','s4','s5','s6','s7','s8','s9','refs'].map(id => document.getElementById(id));

      window.addEventListener('scroll', () => {
        let current = '';
        sections.forEach(s => {
          if (s && s.getBoundingClientRect().top <= 200) current = s.id;
        });
        sideLinks.forEach(a => {
          a.classList.toggle('active', a.getAttribute('href') === '#' + current);
        });
        // Show/hide based on s1 position
        if (s1.getBoundingClientRect().top > window.innerHeight * 0.8) {
          sideNav.classList.remove('visible');
        } else {
          sideNav.classList.add('visible');
        }
      }, { passive: true });
